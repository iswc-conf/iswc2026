name: Build and Deploy to GitHub Pages
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm install
    - name: Build the project
      run: CI=false npm run build
    - name: Add Google verification file
      run: |
        echo "google-site-verification: google2c8028c0c6e3481b.html" > ./build/google2c8028c0c6e3481b.html
    - name: Add CNAME file for custom domain
      run: echo "iswc2026.semanticweb.org" > ./build/CNAME
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build
