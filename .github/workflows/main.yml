name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke-test every route
        run: npm run smoke

      - name: Build the site
        run: npm run build

      - name: Add Google verification file
        run: echo "google-site-verification: google2c8028c0c6e3481b.html" > ./build/google2c8028c0c6e3481b.html

      - name: Add CNAME file for custom domain
        run: echo "iswc2026.semanticweb.org" > ./build/CNAME

      # HashRouter serves everything from index.html, but a 404 copy stops
      # direct hits on unknown paths showing GitHub's error page.
      - name: Add SPA fallback
        run: cp ./build/index.html ./build/404.html

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
